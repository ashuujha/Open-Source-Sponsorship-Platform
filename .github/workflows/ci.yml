name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  smart-contracts:
    name: Build & Test Soroban Contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Run Cargo Tests
        run: cargo test --manifest-path contracts/Cargo.toml

      - name: Build WebAssembly Contracts
        run: cargo build --manifest-path contracts/Cargo.toml --target wasm32-unknown-unknown --release

  frontend:
    name: Build & Test Next.js Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript & Next.js Build
        run: npm run build

      - name: Run Vitest Suite
        run: npx vitest run
